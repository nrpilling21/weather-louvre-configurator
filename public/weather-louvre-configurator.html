<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eFans Weather Louvre Configurator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f7; font-family: 'Inter', system-ui, sans-serif; color: #1d1d1f; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    width: 420px; padding: 40px 36px 32px; position: relative;
  }

  .logo { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #86868b; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 500; color: #1d1d1f; margin-bottom: 28px; }

  .section { margin-bottom: 24px; }
  .label { font-size: 12px; font-weight: 500; color: #86868b; letter-spacing: 0.3px; margin-bottom: 10px; }

  /* Supplier toggle */
  .supplier-row { display: flex; gap: 8px; }
  .sup-btn {
    flex: 1; padding: 14px 12px; border-radius: 10px; cursor: pointer;
    border: 2px solid #e5e5e7; background: #fff; transition: all 0.2s; text-align: center;
  }
  .sup-btn:hover { border-color: #c5c5c7; }
  .sup-btn.active { border-color: #0071e3; background: #f0f7ff; }
  .sup-btn .name { font-size: 14px; font-weight: 500; color: #1d1d1f; }
  .sup-btn .formula { font-size: 11px; color: #86868b; margin-top: 3px; }
  .sup-btn.active .name { color: #0071e3; }

  /* Inputs */
  .input-row { display: flex; gap: 12px; }
  .input-group { flex: 1; }
  .input-group label { display: block; font-size: 11px; font-weight: 500; color: #86868b; margin-bottom: 6px; }
  .input-group input {
    width: 100%; border: 2px solid #e5e5e7; border-radius: 10px; padding: 12px 14px;
    font-size: 16px; font-family: inherit; color: #1d1d1f; outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .input-group input::-webkit-outer-spin-button,
  .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .input-group input:focus { border-color: #0071e3; }
  .input-group .unit { font-size: 11px; color: #aeaeb2; margin-top: 4px; }

  /* Dimensions summary */
  .dims {
    display: flex; gap: 0; background: #f5f5f7; border-radius: 10px; overflow: hidden;
    margin-bottom: 24px;
  }
  .dim-item {
    flex: 1; padding: 14px 16px; text-align: center;
    border-right: 1px solid #e5e5e7;
  }
  .dim-item:last-child { border-right: none; }
  .dim-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: #86868b; margin-bottom: 4px; }
  .dim-val { font-size: 15px; font-weight: 600; color: #1d1d1f; }
  .dim-val small { font-size: 12px; font-weight: 400; color: #aeaeb2; }

  /* Download button */
  .dl-btn {
    width: 100%; padding: 15px 0; text-align: center; font-size: 14px;
    font-weight: 500; color: #fff; background: #0071e3; border: none;
    border-radius: 10px; cursor: pointer; transition: background 0.2s; font-family: inherit;
  }
  .dl-btn:hover { background: #0077ed; }
  .dl-btn:active { background: #006edb; }
  .dl-btn.loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">eFans Direct</div>
  <h1>Weather Louvre Configurator</h1>

  <div class="section">
    <div class="label">Supplier</div>
    <div class="supplier-row">
      <div class="sup-btn active" data-sup="londonvents">
        <div class="name">London Vents</div>
        <div class="formula">Flange +50 · Neck -10</div>
      </div>
      <div class="sup-btn" data-sup="systemair">
        <div class="name">Systemair</div>
        <div class="formula">Flange +45 · Neck -12</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Hole Size</div>
    <div class="input-row">
      <div class="input-group">
        <label>Width</label>
        <input type="number" id="inW" value="300" min="100" max="3000" step="5">
        <div class="unit">mm</div>
      </div>
      <div class="input-group">
        <label>Height</label>
        <input type="number" id="inH" value="300" min="100" max="3000" step="5">
        <div class="unit">mm</div>
      </div>
    </div>
  </div>

  <div class="dims">
    <div class="dim-item">
      <div class="dim-label">Flange</div>
      <div class="dim-val"><span id="dFW">350</span> × <span id="dFH">350</span> <small>mm</small></div>
    </div>
    <div class="dim-item">
      <div class="dim-label">Neck</div>
      <div class="dim-val"><span id="dNW">290</span> × <span id="dNH">290</span> <small>mm</small></div>
    </div>
  </div>
  <button class="dl-btn" id="dlBtn">Download Approvalrawing</button>
</div>

const SUPPLIERS = {
  londonvents: { name: "London Vents", flangeAdd: 50, neckSub: 10 },
  systemair:   { name: "Systemair",    flangeAdd: 45, neckSub: 12 }
};

let supplier = "londonvents";
let holeW = 300, holeH = 300;

function flangeSize(hole) { return hole + SUPPLIERS[supplier].flangeAdd; }
function neckSize(hole) { return hole - SUPPLIERS[supplier].neckSub; }

function updateDims() {
  document.getElementById('dFW').textContent = flangeSize(holeW);
  document.getElementById('dFH').textContent = flangeSize(holeH);
  document.getElementById('dNW').textContent = neckSize(holeW);
  document.getElementById('dNH').textContent = neckSize(holeH);
}
updateDims();

// Supplier toggle
document.querySelectorAll('.sup-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sup-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    supplier = b.dataset.sup;
    updateDims();
  });
});

// Size inputs
const inW = document.getElementById('inW'), inH = document.getElementById('inH');
function onSize() {
  holeW = Math.max(100, Math.min(3000, parseInt(inW.value) || 300));
  holeH = Math.max(100, Math.min(3000, parseInt(inH.value) || 300));
  updateDims();
}
inW.addEventListener('change', onSize);
inW.addEventListener('input', onSize);
inH.addEventListener('change', onSize);
inH.addEventListener('input', onSize);

// PDF generation
async function generatePDF() {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const isSquare = (holeW === holeH);
  const tplB64 = isSquare ? TEMPLATE_SQUARE_B64 : TEMPLATE_RECT_B64;
  const tplBytes = Uint8Array.from(atob(tplB64), c => c.charCodeAt(0));
  const doc = await PDFDocument.load(tplBytes);
  const page = doc.getPages()[0];
  const { height: pH } = page.getSize();
  const font = await doc.embedFont(StandardFonts.Helvetica);
  const fontB = await doc.embedFont(StandardFonts.HelveticaBold);

  const flW = flangeSize(holeW), flH = flangeSize(holeH);
  const nkW = neckSize(holeW), nkH = neckSize(holeH);
  const w = rgb(1, 1, 1), dk = rgb(0.176, 0.176, 0.176);
  const pad = 4;

  function wo(x0, x1, top, bot, text, fs) {
    fs = fs || 14;
    page.drawRectangle({ x: x0 - pad, y: pH - (bot + pad), width: (x1 - x0) + pad * 2 + 40, height: (bot - top) + pad * 2, color: w, borderWidth: 0 });
    page.drawText(text, { x: x0, y: pH - bot + 2, size: fs, font: font, color: dk });
  }

  function woB(x0, x1, top, bot, text, fs) {
    fs = fs || 10;
    page.drawRectangle({ x: x0 - pad, y: pH - (bot + pad), width: (x1 - x0) + pad * 2 + 60, height: (bot - top) + pad * 2, color: w, borderWidth: 0 });
    page.drawText(text, { x: x0, y: pH - bot + 1, size: fs, font: fontB, color: dk });
  }

  if (isSquare) {
    wo(635.9, 693.6, 96.0, 114.0, flW + "mm");
    wo(186.3, 244.0, 363.4, 381.4, flH + "mm");
    wo(933.7, 991.4, 364.0, 382.0, nkH + "mm");
    wo(625.8, 683.5, 682.3, 700.3, nkW + "mm");
    woB(584.9, 736.3, 802.1, 812.1, "Size: " + holeW + "mm wide x " + holeH + "mm high");
  } else {
    wo(611.1, 668.9, 119.7, 137.7, flW + "mm");
    wo(125.8, 183.5, 363.3, 381.3, flH + "mm");
    wo(995.0, 1052.8, 364.0, 382.0, nkH + "mm");
    wo(601.0, 658.7, 653.6, 671.6, nkW + "mm");
    woB(555.7, 840.7, 898.8, 912.8, "Actual hole Size: " + holeW + "mm wide x " + holeH + "mm high");
  }

  return await doc.save();
}

document.getElementById('dlBtn').addEventListener('click', async function() {
  const btn = this;
  btn.classList.add('loading');
  btn.textContent = 'Generating...';
  try {
    const bytes = await generatePDF();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "eFans_WL_" + holeW + "x" + holeH + "_" + SUPPLIERS[supplier].name.replace(/\s/g, '') + ".pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(err) {
    alert('Error: ' + err.message);
    console.error(err);
  }
  btn.classList.remove('loading');
  btn.textContent = 'Download Approval Drawing';
});
</script>
